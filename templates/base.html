<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpamGuard — AI Spam Detector</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <nav class="sg-nav">
        <a href="{{ url_for('index') }}" class="sg-logo">SPAM<span>GUARD</span></a>
        <div class="sg-nav-links">
            <a href="{{ url_for('index') }}">DETECTOR</a>
            <a href="{{ url_for('auth.login') }}">ADMIN</a>
        </div>
    </nav>

    <div class="container py-5">
        {% block content %}{% endblock %}
    </div>

    <!-- Modal block is OUTSIDE the container so z-index doesn't trap it -->
    {% block modal %}{% endblock %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
