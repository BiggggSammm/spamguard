<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — SpamGuard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <nav class="sg-nav">
        <a href="{{ url_for('index') }}" class="sg-logo">SPAM<span>GUARD</span></a>
        <div class="sg-nav-links">
            <a href="{{ url_for('index') }}">DETECTOR</a>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row justify-content-center sg-fade-in">
            <div class="col-md-6 col-lg-4">

                <!-- Header -->
                <div class="text-center mb-4">
                    <span class="sg-label">RESTRICTED ACCESS</span>
                    <h1 class="font-mono text-accent" style="font-size: 1.6rem; letter-spacing: 3px;">
                        ADMIN LOGIN
                    </h1>
                    <p class="text-muted-sg" style="font-size: 0.85rem; margin-top: 0.4rem;">
                        Authorised personnel only
                    </p>
                </div>

                <!-- Login card -->
                <div class="sg-card">

                    <!-- Flash messages -->
                    {% with messages = get_flashed_messages(with_categories=true) %}
                      {% if messages %}
                        {% for category, message in messages %}
                          <div class="sg-alert sg-alert-{{ 'success' if category == 'success' else 'danger' if category == 'danger' else 'warning' if category == 'warning' else 'info' }}">
                            {{ message }}
                          </div>
                        {% endfor %}
                      {% endif %}
                    {% endwith %}

                    <form method="POST" action="{{ url_for('auth.login') }}">

                        <div class="mb-3">
                            <span class="sg-label">USERNAME</span>
                            <input type="text" name="username" id="username"
                                   class="sg-textarea" style="resize: none; height: auto; padding: 0.75rem 1rem;"
                                   placeholder="Enter username" required autofocus>
                        </div>

                        <div class="mb-4">
                            <span class="sg-label">PASSWORD</span>
                            <input type="password" name="password" id="password"
                                   class="sg-textarea" style="resize: none; height: auto; padding: 0.75rem 1rem;"
                                   placeholder="Enter password" required>
                        </div>

                        <button type="submit" class="btn-sg-primary">
                            🔐 &nbsp; LOGIN
                        </button>

                    </form>
                </div>

                <!-- Back link -->
                <div class="text-center mt-3">
                    <a href="{{ url_for('index') }}" class="btn-sg-ghost"
                       style="font-size: 0.75rem;">
                        ← Back to SpamGuard
                    </a>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
